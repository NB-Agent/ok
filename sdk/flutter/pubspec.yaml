name: ok_agent
description: "OK Agent — AI assistant for everyone. Connect to your OK Agent via HCP WebSocket."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  flutter_markdown: ^0.6.22
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: AppIcons
      fonts:
        - asset: assets/fonts/AppIcons.ttf

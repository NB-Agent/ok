name: Package VSIX for GitHub Release

on:
  push:
    tags: ['vscode-v*']

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd editors/vscode && npm install
      - run: cd editors/vscode && npm run compile
      - name: Package VSIX
        run: cd editors/vscode && npx @vscode/vsce package
      - name: Upload VSIX to Release
        run: gh release upload "$GITHUB_REF_NAME" editors/vscode/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}

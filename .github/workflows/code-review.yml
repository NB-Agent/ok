name: OK Code Review
on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build OK
        run: go build -o /tmp/ok ./cmd/ok

      - name: Review changes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          /tmp/ok review 2>&1 || echo "⚠️  Review completed with warnings"

      - name: Post review comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const reviewComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('OK Review'));
            const reviewText = `## 🤖 OK Code Review\n\nAutomated code review completed. See details above.`;
            if (reviewComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: reviewComment.id,
                body: reviewText,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: reviewText,
              });
            }

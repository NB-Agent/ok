name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── CLI binaries (cross-compile, no CGo) ──────────────────
  cli:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          binary="ok-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/$binary" ./cmd/ok
          echo "binary=$binary" >> $GITHUB_ENV

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "dist/${{ env.binary }}" 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" \
            "dist/${{ env.binary }}" --clobber

  # ─── Desktop binary (Windows only, needs CGo + webview2) ──
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build desktop
        run: |
          go build -C desktop -tags desktop,wv2runtime.download,production `
            -trimpath -ldflags="-s -w" `
            -o "../dist/ok-windows-desktop.exe" .
        shell: pwsh

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/ok-windows-desktop.exe --clobber
        shell: pwsh

  # ─── VSIX extension ────────────────────────────────────────
  vsix:
    runs-on: ubuntu-latest
    needs: [cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd editors/vscode && npm install
      - run: cd editors/vscode && npm run compile
      - name: Package VSIX
        run: cd editors/vscode && npx @vscode/vsce package
      - name: Upload VSIX to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" editors/vscode/*.vsix --clobber

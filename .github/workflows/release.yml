name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── CLI binaries (cross-compile, no CGo) ──────────────────
  cli:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: '386'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          binary="ok-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/$binary" ./cmd/ok
          echo "binary=$binary" >> $GITHUB_ENV

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          # First run creates the release; subsequent runs upload
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "dist/${{ env.binary }}" 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" \
            "dist/${{ env.binary }}" --clobber

  # ─── Desktop app (Wails, Windows only) ─────────────────────
  desktop:
    needs: [cli]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build frontend
        working-directory: desktop/frontend
        run: |
          pnpm install
          pnpm build

      - name: Build desktop app
        working-directory: desktop
        env:
          CGO_ENABLED: "1"
        run: |
          go mod tidy
          wails build -production -trimpath 2>&1

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exe = "desktop/build/bin/ok.exe"
          if (Test-Path $exe) {
            gh release upload "${{ github.ref_name }}" $exe --clobber
          }

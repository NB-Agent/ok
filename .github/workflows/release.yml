name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── CLI binaries (cross-compile, no CGo) ──────────────────
  cli:
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: '386'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          binary="ok-${{ matrix.goos }}-${{ matrix.goarch }}$ext"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/$binary" ./cmd/ok
          echo "binary=$binary" >> $GITHUB_ENV

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          # First run creates the release; subsequent runs upload
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "dist/${{ env.binary }}" 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" \
            "dist/${{ env.binary }}" --clobber

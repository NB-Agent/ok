name: Benchmarks

on:
  pull_request:
    paths:
      - 'internal/**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (base)
        run: |
          git stash
          go test -bench=. -benchmem -count=5 -benchtime=200ms \
            ./internal/diff/ ./internal/agent/ ./internal/memory/ \
            ./internal/provider/ ./internal/config/ \
            | tee base.bench
          git stash pop

      - name: Run benchmarks (PR)
        run: |
          go test -bench=. -benchmem -count=5 -benchtime=200ms \
            ./internal/diff/ ./internal/agent/ ./internal/memory/ \
            ./internal/provider/ ./internal/config/ \
            | tee pr.bench

      - name: benchstat comparison
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat base.bench pr.bench | tee benchstat.txt

      - name: Post benchstat as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('benchstat.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark comparison\n\n```\n' + result + '\n```'
            });

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
        update-types:
          - minor
          - patch
      charmbracelet:
        patterns:
          - "charm.land/*"
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
          - "github.com/mattn/*"
          - "github.com/rivo/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - ci

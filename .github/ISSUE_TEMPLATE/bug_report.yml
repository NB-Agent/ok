name: Bug report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions
  - type: input
    attributes:
      label: OK version
      description: Output of `ok --version`
  - type: input
    attributes:
      label: OS
      description: e.g. Windows 11, macOS 15, Ubuntu 24.04
  - type: textarea
    attributes:
      label: Logs or output
      description: Any error messages or relevant logs

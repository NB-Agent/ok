events {}
http {
    upstream ok_backend {
        server ok:8080;
    }

    server {
        listen 80;
        server_name _;

        # SSE needs buffering off
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for SSE
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        location / {
            proxy_pass http://ok_backend;
        }

        location /events {
            proxy_pass http://ok_backend;
            chunked_transfer_encoding off;
            proxy_set_header Connection '';
        }

        # Uncomment for HTTPS with Let's Encrypt
        # listen 443 ssl;
        # ssl_certificate /etc/letsencrypt/live/ok.yourdomain.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/ok.yourdomain.com/privkey.pem;
    }
}

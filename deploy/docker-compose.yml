services:
  ok:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ok-data:/home/ok/.ok
      - ../ok.toml:/home/ok/ok.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ok-data:

[tools]
enabled = []   # empty = all built-in tools

# Mode controls the interaction style:
#   plan   — read-only; writers blocked, propose a plan for approval
#   normal — prompts before writer calls (y once / a this session / n no)
#   yolo   — writers allowed without prompting (deny rules still apply)
# deny are "ToolName" or "ToolName(glob)" patterns blocked in every mode.
[mode]
default = "normal"
deny    = ["bash(rm -rf*)", "bash(git push*)"]

# Sandbox confines bash to an OS-level jail (macOS Seatbelt, Linux Landlock,
# Windows Job Objects). Bash can only write to the workspace + temp/cache dirs.
# Network allows egress (needed for builds/downloads). bash = "off" disables it.
[sandbox]
bash    = "enforce"
network = true    # egress allowed so builds/downloads work
# workspace_root = ""          # file-writers confined here; empty = current dir
# allow_write    = ["/tmp"]    # extra dirs write_file/edit_file/multi_edit may touch

# CodeGraph code intelligence (symbol/call-graph search via tree-sitter + SQLite),
# shipped as a built-in MCP server. On by default: when the bundle resolves (beside
# the ok binary, then PATH), the agent gains codegraph_* search / context /
# explore / trace / node tools. .codegraph/ is initialised on first use (fast); the
# actual indexing runs in CodeGraph's daemon in the background, so startup never
# blocks even on a large repo. A missing bundle is a silent no-op. Disable to fall
# back to grep/glob, or point `path` at a specific launcher.
# [codegraph]
# enabled = true
# path    = ""   # e.g. "~/.local/bin/codegraph"; empty = bundle, then PATH

# Skills are invokable playbooks (SKILL.md / <name>.md with frontmatter), found
# under .ok/skills, .agents/skills, .agent/skills, .claude/skills (project)
# and the same dirs under ~ (global). Built-ins (explore/research/review/security-review/test)
# ship out of the box. The model invokes them via run_skill / explore / …; you
# invoke them via /<name>. Manage with /skill (list, show, new, paths).
# [skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra "custom"-scope skill roots

# Hooks run shell commands around the loop (PreToolUse / PostToolUse /
# UserPromptSubmit / Stop). They are NOT configured here — put them in
# settings.json: ~/.ok/settings.json (global, always on) and
# <project>/.ok/settings.json (project, runs only after `/hooks trust`).
# Exit 0 = pass, exit 2 = block (PreToolUse / UserPromptSubmit only). Example
# ~/.ok/settings.json:
#   { "hooks": {
#       "PreToolUse":  [ { "match": "bash", "command": "my-guard.sh" } ],
#       "PostToolUse": [ { "match": ".*file", "command": "gofmt -w ." } ],
#       "Stop":        [ { "command": "notify-send 'turn done'" } ] } }

# External stdio plugins (MCP-compatible); each is a standalone executable.
# [[plugins]]
# name    = "example"
# command = "ok-plugin-example"

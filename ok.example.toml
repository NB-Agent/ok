# OK configuration.
# Resolution order: flag > ./ok.toml > ~/.config/ok/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

default_model = "deepseek"   # a provider name (→ its default model) or "provider/model"
# language      = "zh"   # ui language; empty = auto-detect from $LANG / $OK_LANG

[agent]
system_prompt = """
You are OK, a coding agent. Your working method:

0. Perceive the gap — get facts, define target, identify what to decompose.
1. Decomposition — recursively break into yes/no sub-problems to atomic actions.
2. Verification — post-order: children first, then parent (logical AND). On no: backtrack.
3. Resolution — root = yes → done.

Task tree protocol: spawn via task(), manage slots, parallel where independent.
Constraints: read/write files, run shell commands, ask for user choices, track with todo_write.
"""
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 25
temperature = 0.0
# planner_model = "mimo-pro"   # optional: enable two-model collaboration
# max_concurrent_tasks = 5     # sub-agent slots; matches typical API concurrency limits. 0 = unlimited

# A provider is a vendor endpoint (one base_url + key) that offers one or more
# models. Use `models = [...]` to expose several under a single entry — switching
# models reuses the same connection; no need to re-declare base_url/api_key.
[[providers]]
name        = "deepseek"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash", "deepseek-v4-pro"]
default     = "deepseek-v4-flash"   # optional; defaults to the first of `models`
api_key_env = "DEEPSEEK_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }   # per 1M tokens

# A single-model provider still works (use `model = "..."`) — pick this form when a
# model needs its own base_url / context_window / price (e.g. the two MiMo SKUs
# below have different context windows).

[[providers]]
name           = "mimo-pro"
kind           = "openai"
base_url       = "https://api.xiaomimimo.com/v1"
model          = "mimo-v2.5-pro"   # thinking-mode on by default; reasoning_content rendered dim above the answer
api_key_env    = "MIMO_API_KEY"
context_window = 1000000

[[providers]]
name           = "mimo-flash"
kind           = "openai"
base_url       = "https://api.xiaomimimo.com/v1"
model          = "mimo-v2-flash"   # thinking-mode off by default; cheaper / faster
api_key_env    = "MIMO_API_KEY"
context_window = 65536

# Anthropic (Claude) provider — uses the native Messages API, not OpenAI-compatible.
[[providers]]
name           = "claude"
kind           = "anthropic"
base_url       = "https://api.anthropic.com"       # or your proxy endpoint
models         = ["claude-sonnet-4-20250514", "claude-haiku-3-5-20241022"]
default        = "claude-sonnet-4-20250514"
api_key_env    = "ANTHROPIC_API_KEY"
context_window = 200000

